services:
  php:
    container_name: sc2coop-php
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./html:/var/www/html
      - ./source-data:/var/www/source-data
      - ./source-html:/var/www/source-html
      - ./includes:/var/www/includes
      - ./generate-static.php:/var/www/generate-static.php
      - ./generate-html-dir.ts:/var/www/generate-html-dir.ts

  web:
    container_name: sc2coop-web
    build:
      context: .
      dockerfile: docker/Dockerfile.apache
    ports:
      - "8080:80"
    volumes:
      - ./html:/var/www/html
    depends_on:
      - php
